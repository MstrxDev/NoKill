name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test -c Release --nologo

      # CI has no signing certificate; local release builds run package.ps1
      # with the cert instead. When a production cert exists (e.g. Azure
      # Trusted Signing), signing moves here.
      - name: Package (unsigned)
        run: powershell -ExecutionPolicy Bypass -File scripts/package.ps1 -SkipSigning

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$env:GITHUB_REF_NAME" 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release already exists (created manually with signed artifacts); skipping."
          } else {
            gh release create "$env:GITHUB_REF_NAME" (Get-Item artifacts\*.msi).FullName --generate-notes --verify-tag
          }
